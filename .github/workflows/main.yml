# This is a basic workflow to help you get started with Actions

name: CI

# Controls when the action will run. Triggers the workflow on push or pull request
# events but only for the master branch
on:
  workflow_dispatch:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  lint:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest
    steps:
      - name: checkout repo
        uses: actions/checkout@v6
      #----------------------------------------------
      #  -----  install & configure uv  -----
      #----------------------------------------------
      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.10"
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Run linters
        run: |
          make lint

  tests:
    # The type of runner that the job will run on
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # first list entry: lower bound, second list entry: upper bound
        # of the supported python versions, versions in between are assumed
        # to be supported as well without further testing
        python-version: ["3.10", "3.14"]
        os: [ubuntu-latest, windows-latest, macos-latest]

    defaults:
      run:
        shell: bash

    steps:
      - name: checkout repo
        uses: actions/checkout@v6
      #----------------------------------------------
      #  -----  install & configure uv  -----
      #----------------------------------------------
      - name: Set up uv
        id: setup-uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true

      #----------------------------------------------
      # install dependencies
      #----------------------------------------------
      - name: Install dependencies
        run: uv sync

      #----------------------------------------------
      # install Agave CLI + start test validator
      #----------------------------------------------
      - name: Install Agave CLI
        if: matrix.os != 'windows-latest'
        run: sh -c "$(curl -sSfL https://release.anza.xyz/stable/install)"

      - name: Add Agave bin to PATH
        if: matrix.os != 'windows-latest'
        run: echo "$HOME/.local/share/solana/install/active_release/bin" >> "$GITHUB_PATH"

      - name: Run all tests (ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          make tests-parallel

      - name: Run all tests (macos)
        if: matrix.os == 'macos-latest'
        run: |
          make tests-parallel

      - name: Run unit tests
        if: matrix.os == 'windows-latest'
        run: |
          make unit-tests

      - name: Upload html coverage
        uses: actions/upload-artifact@v7
        with:
          name: coverage-html-${{ runner.os }}-${{ matrix.python-version }}
          path: htmlcov
          include-hidden-files: true
          if-no-files-found: error

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        # Do not upload/fail for PRs in forks
        if: github.repository == 'michaelhly/solana-py'
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: ${{ runner.os }},${{ runner.arch }},${{ matrix.python-version }}
          # Specify whether or not CI build should fail if Codecov runs into an error during upload
          fail_ci_if_error: true

  test:
    # https://github.community/t/is-it-possible-to-require-all-github-actions-tasks-to-pass-without-enumerating-them/117957/4?u=graingert
    runs-on: ubuntu-latest
    needs: tests
    steps:
      - name: note that all tests succeeded
        run: echo "🎉"
